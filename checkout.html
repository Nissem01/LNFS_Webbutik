<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNFS Webshop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">LNFS</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>
                </ul>
            </div>
        </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card p-4 shadow border-0">
            <div class="row g-4 align-items-start">
                <div class="col-md-5 border-end">
                    <div id="specificProductDisplay" class="text-center"></div>
                </div>

                <div class="col-md-7">
                    <h2 class="mb-4">Order product</h2>


                    <form id="order">

                        <div class="mb-3">
                            <label class="form-label">Firstname:</label>
                            <input class="form-control" type="text" id="name" name="name" placeholder="Adam Smith"
                                required />
                            <small id="nameError" class="text-danger"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-post:</label>
                            <input class="form-control" type="email" id="email" name="email"
                                placeholder="adamsmith@example.com " />
                            <small id="emailError" class="text-danger"></small>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phonenumber:</label>
                            <input class="form-control" type="text" id="phonenumber" name="phonenumber"
                                placeholder="(+46)12345678" />
                            <small id="numberError" class="text-danger"></small>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Streetname:</label>
                            <input class="form-control" type="text" id="streetName" name="streetName"
                                placeholder="Storgatan 1" />
                            <small id="streetError" class="text-danger"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Zipcode:</label>
                            <input class="form-control" type="number" id="zipcode" name="zipcode" placeholder="11111" />
                            <small id="zipcodeError" class="text-danger"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">City:</label>
                            <input class="form-control" type="text" id="city" name="city" placeholder="Årjäng" />
                            <small id="cityError" class="text-danger"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message:</label>
                            <textarea class="form-control" id="message" name="message" placeholder=""></textarea>
                        </div>

                        <div class="form-check mb-3">

                            <input class="form-check-input" type="checkbox" id="newsletter" checked /> <label
                                class="form-check-label">Subscribe to our newsletter! </label>
                        </div>

                        <div>
                            <button class="btn btn-outline-dark" type="submit">Submit</button>
                        </div>

                    </form>
                    <div id="result"></div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- ===FOOTER=== -->
    <footer class="footer py-5 text-center">
        <h2 class="mb-4 text-white">Contact us</h2>
        <div class="container">
            <div class="row g-4">

                <div class="col-md-4">
                    <div class="footer-card">
                        <h5>Address</h5>
                        <p>Stockholm, Sweden</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="footer-card">
                        <h5>Email</h5>
                        <p>info@lnfs.se</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="footer-card">
                        <h5>Phone</h5>
                        <p>070-123 45 67</p>
                    </div>
                </div>
            </div>

        </div>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="fetchProduct.js"></script>
    <script src="form.js"></script>

</body>

</html>
